<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历史报告归档 · AI 数据分析平台</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="assets/form.css">
  <style>
    .archive-wrap { max-width: 960px; margin: 0 auto; padding: 28px 24px 80px; }
    .archive-empty { text-align: center; padding: 60px 20px; color: var(--text-3); }
    .archive-empty .icon { font-size: 48px; margin-bottom: 12px; }
    .archive-list { display: flex; flex-direction: column; gap: 14px; }

    /* 筛选器 */
    .filter-bar {
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px;
      padding: 10px 14px; background: #f7f8fa; border-radius: 8px; align-items: center;
    }
    .filter-bar label { font-size: 12px; font-weight: 600; color: var(--text-2); flex: none; }
    .filter-bar select, .filter-bar input {
      font-size: 12px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px;
      background: #fff; flex: 1; min-width: 100px;
    }
    .filter-bar input { max-width: 160px; }
    .filter-bar .filter-btn {
      font-size: 12px; font-weight: 600; padding: 6px 16px; border-radius: 6px;
      cursor: pointer; border: 1px solid var(--brand-1); background: var(--brand-1); color: #fff; flex: none;
    }
    .filter-bar .filter-btn:hover { opacity: .9; }

    /* 卡片 */
    .archive-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 18px 22px; box-shadow: var(--shadow); transition: box-shadow .2s;
      cursor: pointer;
    }
    .archive-card:hover { box-shadow: var(--shadow-hover); }
    .archive-card .head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
    .archive-card .head .module-tag {
      font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 5px;
      background: var(--blue-bg); color: var(--blue);
    }
    .archive-card .head .product-tag { background: #e8f5e9; color: #2e7d32; }
    .archive-card .head .owner-tag { background: #fff8e1; color: #b8860b; }
    .archive-card .head .time { font-size: 11px; color: var(--text-3); margin-left: auto; }
    .archive-card .title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .archive-card .goal { font-size: 13px; color: var(--text-2); margin-bottom: 4px; }
    .archive-card .card-meta { font-size: 11px; color: var(--text-3); }
    .archive-card .actions { margin-top: 12px; display: flex; gap: 10px; }
    .archive-card .actions button {
      font-size: 12px; padding: 5px 12px; border-radius: 6px; cursor: pointer;
      border: 1px solid var(--border); background: #fff; color: var(--text-2);
    }
    .archive-card .actions button:hover { border-color: var(--brand-1); color: var(--brand-1); }
    .archive-card .actions .del-btn:hover { border-color: var(--red); color: var(--red); }

    /* 详情弹层 */
    .detail-overlay {
      display: none; position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(3px);
    }
    .detail-overlay.show { display: flex; align-items: center; justify-content: center; }
    .detail-panel {
      background: var(--surface); border-radius: var(--radius); width: 90%; max-width: 800px;
      max-height: 85vh; overflow-y: auto; padding: 28px; box-shadow: 0 16px 48px rgba(0,0,0,0.2);
    }
    .detail-panel h2 { font-size: 18px; margin-bottom: 16px; }
    .detail-panel .meta { font-size: 12px; color: var(--text-3); margin-bottom: 16px; }
    .detail-panel pre {
      background: #f7f8fa; border-radius: 8px; padding: 16px; font-size: 12px;
      overflow-x: auto; white-space: pre-wrap; word-break: break-word; margin: 12px 0;
      max-height: 300px; overflow-y: auto;
    }
    .detail-panel .close-btn {
      position: sticky; top: 0; float: right; font-size: 20px; cursor: pointer;
      background: none; border: none; color: var(--text-3); padding: 4px 8px;
    }
    .detail-panel .close-btn:hover { color: var(--red); }
    .detail-panel .top-actions {
      display: none;
    }
    .detail-panel .meta {
      font-size: 12px; color: var(--text-3); margin-bottom: 16px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .detail-panel .meta .btn-back {
      font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 5px;
      cursor: pointer; border: none;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff;
      text-decoration: none; margin-left: auto;
    }
    .detail-panel .meta .btn-back:hover { opacity: .85; }
    .detail-tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .detail-tab {
      font-size: 12px; font-weight: 600; padding: 6px 14px; cursor: pointer;
      border: 1px solid var(--border); border-radius: 6px; background: #f4f5f7; color: var(--text-2);
    }
    .detail-tab.active { background: var(--surface); color: var(--brand-1); border-color: var(--brand-1); }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="logo">📊</div>
    <h1>AI 数据分析平台</h1>
    <span class="sub">历史报告归档</span>
    <nav><a href="index.html">← 返回工作台</a></nav>
  </div>
</header>

<div class="archive-wrap">
  <h2 style="margin-bottom:6px;">🗂️ 历史报告归档</h2>
  <p style="font-size:13px;color:var(--text-3);margin-bottom:16px;">保存的分析需求与产物，点击可查看完整信息。数据存储在浏览器本地。</p>

  <!-- 筛选器 -->
  <div class="filter-bar">
    <label>筛选：</label>
    <select id="filter-module">
      <option value="">全部类型</option>
      <option value="revenue_analysis">付费/收入</option>
      <option value="ab_test">AB实验</option>
      <option value="funnel">漏斗转化</option>
      <option value="retention_ltv">留存LTV</option>
      <option value="user_seg">用户分群</option>
      <option value="causal">因果链</option>
      <option value="daily_query">日常取数</option>
      <option value="metric_diag">指标诊断</option>
    </select>
    <select id="filter-product">
      <option value="">全部产品</option>
      <option value="P10">P10</option>
      <option value="SKB">SKB</option>
      <option value="UNO">UNO</option>
      <option value="UNO2">UNO2</option>
    </select>
    <select id="filter-owner">
      <option value="">全部需求人</option>
    </select>
    <input type="text" id="filter-search" placeholder="搜索项目/主题...">
    <button class="filter-btn" onclick="renderList()">筛选</button>
  </div>

  <div id="archive-list"></div>
</div>

<!-- 详情弹层 -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-panel" id="detail-panel"></div>
</div>

<script src="assets/form-framework.js"></script>
<script>
const MODULE_LABELS = { revenue_analysis:'付费/收入', ab_test:'AB实验', funnel:'漏斗转化', retention_ltv:'留存LTV', user_seg:'用户分群', causal:'因果链', daily_query:'日常取数', metric_diag:'指标诊断' };
const MODULE_FORMS = { revenue_analysis:'modules/revenue_analysis_form.html', ab_test:'modules/ab_test_form.html', funnel:'modules/funnel_analysis_form.html', retention_ltv:'modules/retention_ltv_form.html', user_seg:'modules/user_segmentation_form.html', causal:'modules/causal_chain_form.html', daily_query:'modules/daily_query_form.html', metric_diag:'modules/metric_diagnostics_form.html' };

document.addEventListener('DOMContentLoaded', () => {
  populateOwnerFilter();
  renderList();
  document.getElementById('detail-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetail(); });
  document.getElementById('filter-module').addEventListener('change', renderList);
  document.getElementById('filter-product').addEventListener('change', renderList);
  document.getElementById('filter-owner').addEventListener('change', renderList);
  document.getElementById('filter-search').addEventListener('input', renderList);
});

function populateOwnerFilter() {
  const list = FF.getArchives();
  const owners = [...new Set(list.map(r => r.data?.owner).filter(Boolean))].sort();
  const select = document.getElementById('filter-owner');
  owners.forEach(o => {
    const opt = document.createElement('option');
    opt.value = o; opt.textContent = o;
    select.appendChild(opt);
  });
}

function getFiltered() {
  let list = FF.getArchives();
  const module = document.getElementById('filter-module').value;
  const product = document.getElementById('filter-product').value;
  const owner = document.getElementById('filter-owner').value;
  const search = document.getElementById('filter-search').value.toLowerCase().trim();
  if (module) list = list.filter(r => r.module === module);
  if (product) list = list.filter(r => r.product === product);
  if (owner) list = list.filter(r => (r.data?.owner || '') === owner);
  if (search) list = list.filter(r => ((r.project||'')+(r.goal||'')+(r.data?.owner||'')).toLowerCase().includes(search));
  return list;
}

function renderList() {
  const list = getFiltered();
  const container = document.getElementById('archive-list');
  if (!list.length) {
    container.innerHTML = `<div class="archive-empty"><div class="icon">📭</div><p>没有匹配的记录</p></div>`;
    container.className = '';
    return;
  }
  container.innerHTML = '';
  container.className = 'archive-list';
  list.forEach(r => {
    const date = new Date(r.timestamp);
    const dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
    const owner = r.data?.owner || '';
    const card = document.createElement('div');
    card.className = 'archive-card';
    card.innerHTML = `
      <div class="head">
        <span class="module-tag">${MODULE_LABELS[r.module] || r.module}</span>
        <span class="module-tag product-tag">${r.product || '-'}</span>
        ${owner ? `<span class="module-tag owner-tag">👤 ${FF.esc(owner)}</span>` : ''}
        <span class="time">${dateStr}</span>
      </div>
      <div class="title">${FF.esc(r.project || '未命名分析')}</div>
      <div class="goal">${FF.esc(r.goal || '')}</div>
      <div class="card-meta">类型: ${MODULE_LABELS[r.module]||r.module} | 产品: ${r.product||'-'}${owner?' | 创建人: '+FF.esc(owner):''}</div>
      <div class="actions">
        <button class="view-btn">📄 查看详情</button>
        <button class="del-btn">🗑️ 删除</button>
      </div>
    `;
    card.querySelector('.view-btn').addEventListener('click', e => { e.stopPropagation(); showDetail(r); });
    card.querySelector('.del-btn').addEventListener('click', e => {
      e.stopPropagation();
      if (confirm('确认删除此记录？')) { FF.deleteArchive(r.id); renderList(); }
    });
    card.addEventListener('click', () => showDetail(r));
    container.appendChild(card);
  });
}

function showDetail(record) {
  const panel = document.getElementById('detail-panel');
  const date = new Date(record.timestamp);
  const dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
  const formUrl = MODULE_FORMS[record.module] || '';

  let html = `<button class="close-btn" onclick="closeDetail()">✕</button>`;
  html += `<h2>${FF.esc(record.project || '未命名分析')}</h2>`;
  html += `<div class="meta">模块: ${MODULE_LABELS[record.module]||record.module} | 产品: ${record.product} | 时间: ${dateStr}${record.data?.owner?' | 创建人: '+FF.esc(record.data.owner):''}`;
  if (formUrl) html += `<a class="btn-back" href="${formUrl}?restore=${record.id}">↩ 返回表单</a>`;
  html += `</div>`;
  html += `<p style="margin-bottom:16px;font-size:13px;">${FF.esc(record.goal || '')}</p>`;

  if (record.artifacts && record.artifacts.length) {
    html += `<div class="detail-tabs">`;
    record.artifacts.forEach((a, i) => {
      html += `<div class="detail-tab${i===0?' active':''}" data-idx="${i}">${a.label}</div>`;
    });
    html += `<div class="detail-tab" data-idx="input">📝 输入信息</div>`;
    html += `</div>`;
    record.artifacts.forEach((a, i) => {
      html += `<pre class="detail-content" data-idx="${i}" style="${i>0?'display:none':''}">${FF.esc(a.content)}</pre>`;
    });
    html += `<pre class="detail-content" data-idx="input" style="display:none">${FF.esc(JSON.stringify(record.data, null, 2))}</pre>`;
  }

  panel.innerHTML = html;
  document.getElementById('detail-overlay').classList.add('show');

  panel.querySelectorAll('.detail-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      panel.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
      panel.querySelectorAll('.detail-content').forEach(c => c.style.display = 'none');
      tab.classList.add('active');
      panel.querySelector(`.detail-content[data-idx="${tab.dataset.idx}"]`).style.display = '';
    });
  });
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('show');
}
</script>
</body>
</html>
